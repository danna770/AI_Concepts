<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM AI Fundamentals — Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&family=IBM+Plex+Serif:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Pastel */
            --pastel-azul: #8598c4;
            --pastel-celeste: #8eb0c9;
            --pastel-menta: #aee0cd;
            --pastel-salvia: #d7ebd3;
            --pastel-rosa: #ecc0d5;
            --bg: #f9f9fb;
            --surface: #ffffff;
            --border: #dde1e6;
            /* Se mantienen los colores originales oscuros SOLO para el texto */
            --text: #21272a;
            --text2: #697077;
            --danger: #ff6b6b;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans',sans-serif;
            min-height: 100vh;
            overflow-x: hidden
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(133,152,196,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(133,152,196,.15) 1px,transparent 1px);
                background-size: 32px 32px;
                pointer-events: none;
                z-index: 0
            }

        /* ── HEADER ── */
        header {
            position: relative;
            z-index: 10;
            background: var(--pastel-azul);
            padding: 2.5rem 2.5rem 2rem;
            border-bottom: 3px solid var(--pastel-celeste)
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem
        }

        .header-brand {
            display: flex;
            flex-direction: column;
            gap: .3rem
        }

        .ibm-eyebrow {
            font-family: 'IBM Plex Mono',monospace;
            font-size: .62rem;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--pastel-rosa)
        }

        .header-title {
            font-family: 'IBM Plex Serif',serif;
            font-size: clamp(2rem,5vw,3.2rem);
            font-weight: 300;
            line-height: 1.1;
            color: #fff;
            outline: none
        }

            .header-title span {
                color: var(--pastel-menta);
                font-weight: 600
            }

        .header-sub {
            font-family: 'IBM Plex Sans',sans-serif;
            font-size: .9rem;
            font-weight: 300;
            color: #fff;
            opacity: .7;
            margin-top: .2rem;
            outline: none
        }

        .header-actions {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            align-self: center
        }

        /* ── BUTTONS ── */
        .btn {
            font-family: 'IBM Plex Sans',sans-serif;
            font-size: .72rem;
            font-weight: 600;
            padding: .5rem 1rem;
            border: 1.5px solid transparent;
            border-radius: 2px;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            letter-spacing: .04em
        }

        .btn-primary {
            background: var(--pastel-celeste);
            color: #fff;
            border-color: var(--pastel-celeste)
        }

            .btn-primary:hover {
                background: var(--pastel-menta);
                border-color: var(--pastel-menta);
                color: var(--text)
            }

        .btn-ghost {
            background: transparent;
            color: #fff;
            border-color: rgba(255,255,255,.5)
        }

            .btn-ghost:hover {
                border-color: #fff;
                background: rgba(255,255,255,.1)
            }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: var(--danger)
        }

            .btn-danger:hover {
                background: var(--danger);
                color: #fff
            }

        .btn-sm {
            font-size: .62rem;
            padding: .3rem .7rem
        }

        /* ── TOOLBAR (Agrandado) ── */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2.5rem; /* Padding aumentado */
            display: flex;
            gap: .7rem; /* Separación aumentada */
            flex-wrap: wrap;
            align-items: center
        }

        .cat-pill {
            font-family: 'IBM Plex Mono',monospace;
            font-size: .7rem; /* Fuente aumentada */
            font-weight: 600;
            padding: .6rem 1.2rem; /* Padding aumentado */
            border-radius: 100px;
            border: 2px solid var(--pastel-celeste); /* Borde un poco más grueso */
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all .15s;
            display: inline-flex;
            align-items: center;
            gap: .5rem; /* Separación icono/texto aumentada */
            white-space: nowrap
        }

            .cat-pill:hover {
                border-color: var(--pastel-azul);
                color: var(--pastel-azul)
            }

            .cat-pill.active {
                background: var(--pastel-azul);
                border-color: var(--pastel-azul);
                color: #fff
            }

        .pill-count {
            background: var(--pastel-salvia);
            border-radius: 100px;
            padding: .15rem .6rem; /* Padding aumentado */
            font-size: .8rem; /* Fuente aumentada */
            color: var(--text)
        }

        .cat-pill.active .pill-count {
            background: rgba(255,255,255,.2);
            color: #fff
        }

        /* ── STATS (Agrandado) ── */
        .stats-bar {
            position: relative;
            z-index: 5;
            padding: 1rem 2.5rem; /* Padding aumentado */
            display: flex;
            gap: 2rem; /* Separación aumentada */
            flex-wrap: wrap;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-family: 'IBM Plex Mono',monospace;
            font-size: .9rem; /* Fuente aumentada */
            color: var(--text2)
        }

            .stats-bar strong {
                color: var(--pastel-azul)
            }

        /* ── MAIN ── */
        #main {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto
        }

        .section {
            padding: 2.5rem 2.5rem 0
        }

        /* ── SECTION HEADER (Agrandado) ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem; /* Margen inferior aumentado */
            padding-bottom: 1.2rem; /* Padding inferior aumentado */
            border-bottom: 3px solid var(--pastel-salvia) /* Borde más grueso */
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: .8rem; /* Separación aumentada */
            font-family: 'IBM Plex Mono',monospace;
            font-size: 1.2rem; /* Fuente aumentada considerablemente */
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase
        }

        .section-dot {
            width: 14px; /* Punto más grande */
            height: 14px; /* Punto más grande */
            border-radius: 50%;
            flex-shrink: 0
        }

        .section-badge {
            font-family: 'IBM Plex Mono',monospace;
            font-size: .85rem; /* Fuente aumentada */
            background: var(--pastel-salvia);
            border-radius: 4px;
            padding: .2rem .6rem; /* Padding aumentado */
            color: var(--text);
            margin-left: .5rem
        }

        .course-tag {
            font-family: 'IBM Plex Mono',monospace;
            font-size: .85rem; /* Fuente aumentada */
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: .3rem .8rem; /* Padding aumentado */
            border-radius: 4px;
            border: 2px solid var(--pastel-celeste); /* Borde más grueso */
            color: var(--pastel-celeste);
            opacity: .85
        }

        /* ── GRID ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1.2rem;
            padding-bottom: 2.5rem
        }

        @media(max-width:1100px) {
            .cards-grid {
                grid-template-columns: repeat(2,1fr)
            }
        }

        @media(max-width:640px) {
            .cards-grid {
                grid-template-columns: 1fr
            }
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 1.3rem 1.2rem 1.15rem;
            position: relative;
            transition: transform .18s,box-shadow .18s;
            cursor: default;
            overflow: hidden;
            animation: cardIn .3s ease both;
            border-top: 3px solid var(--cat-color,var(--pastel-azul))
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(.975)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,.08),0 0 0 1px var(--cat-color,var(--pastel-azul))
        }

        .card-module {
            font-family: 'IBM Plex Mono',monospace;
            font-size: .5rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--cat-color,var(--pastel-azul));
            opacity: .7;
            margin-bottom: .85rem
        }

        .card-term {
            font-family: 'IBM Plex Sans',sans-serif;
            font-size: .9rem;
            font-weight: 700;
            line-height: 1.25;
            color: var(--text);
            margin-bottom: .6rem
        }

        .card-def {
            font-family: 'IBM Plex Sans',sans-serif;
            font-size: .8rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--text2)
        }

        .card-source {
            display: inline-block;
            margin-top: .6rem;
            font-family: 'IBM Plex Mono',monospace;
            font-size: .52rem;
            color: var(--text2);
            background: var(--pastel-salvia);
            padding: .12rem .38rem;
            border-radius: 2px;
            border-left: 2px solid var(--cat-color,var(--pastel-azul))
        }

        .card-del {
            position: absolute;
            top: .6rem;
            right: .7rem;
            background: transparent;
            border: none;
            color: transparent;
            font-size: .72rem;
            cursor: pointer;
            border-radius: 2px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color .12s,background .12s
        }

        .card:hover .card-del {
            color: var(--pastel-celeste)
        }

        .card-del:hover {
            color: var(--danger) !important;
            background: rgba(218,30,40,.1)
        }

        /* ── MODALS ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center
        }

            .modal-overlay.open {
                display: flex
            }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--pastel-azul);
            border-radius: 2px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            margin: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
            animation: modalIn .2s ease
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.94) translateY(10px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .modal h3 {
            font-family: 'IBM Plex Serif',serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
            color: var(--pastel-azul)
        }

        .form-group {
            margin-bottom: .85rem
        }

        label {
            display: block;
            font-family: 'IBM Plex Mono',monospace;
            font-size: .62rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: .35rem
        }

        input, textarea, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            font-family: 'IBM Plex Sans',sans-serif;
            font-size: .8rem;
            padding: .58rem .82rem;
            outline: none;
            transition: border-color .15s;
            resize: vertical
        }

            input:focus, textarea:focus, select:focus {
                border-color: var(--pastel-azul);
                background: #fff;
                box-shadow: 0 0 0 2px rgba(133,152,196,.25)
            }

        textarea {
            min-height: 88px
        }

        .modal-footer {
            display: flex;
            gap: .75rem;
            justify-content: flex-end;
            margin-top: 1.4rem
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text2);
            font-family: 'IBM Plex Mono',monospace;
            font-size: .72rem
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        /* ── MOBILE OPTIMIZATIONS ── */
        @media (max-width: 640px) {

            /* Header */
            header {
                padding: 1.25rem 1rem 1rem
            }

            .header-inner {
                flex-direction: column;
                align-items: flex-start;
                gap: .85rem
            }

            .header-title {
                font-size: clamp(1.6rem, 8vw, 2.2rem)
            }

            .header-sub {
                font-size: .78rem
            }

            .ibm-eyebrow {
                font-size: .55rem
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start
            }

            .header-actions .btn {
                flex: 1;
                text-align: center;
                font-size: .68rem;
                padding: .55rem .6rem
            }

            /* Toolbar — horizontal scroll */
            .toolbar {
                padding: .75rem 1rem;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: .5rem;
                scrollbar-width: none
            }

            .toolbar::-webkit-scrollbar {
                display: none
            }

            .cat-pill {
                flex-shrink: 0;
                font-size: .62rem;
                padding: .45rem .9rem
            }

            /* Stats bar */
            .stats-bar {
                padding: .65rem 1rem;
                gap: .75rem;
                font-size: .72rem;
                flex-wrap: wrap
            }

            /* Sections */
            .section {
                padding: 1.5rem 1rem 0
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: .65rem;
                margin-bottom: 1.25rem;
                padding-bottom: .85rem
            }

            .section-title {
                font-size: .85rem;
                flex-wrap: wrap
            }

            .section-badge {
                font-size: .72rem
            }

            .course-tag {
                font-size: .72rem;
                padding: .2rem .55rem
            }

            /* Grid → single column (already set, just fix padding) */
            .cards-grid {
                gap: .85rem;
                padding-bottom: 1.5rem
            }

            /* Cards */
            .card {
                padding: 1rem .95rem .9rem
            }

            .card-term {
                font-size: .85rem
            }

            .card-def {
                font-size: .78rem;
                line-height: 1.6
            }

            .card-source {
                font-size: .5rem
            }

            /* Make delete button always visible on mobile (no hover) */
            .card-del {
                color: var(--pastel-celeste)
            }

            /* Modal */
            .modal {
                padding: 1.4rem 1rem;
                margin: .75rem
            }

            .modal h3 {
                font-size: 1rem;
                margin-bottom: 1.1rem
            }

            .modal-footer {
                flex-direction: column-reverse;
                gap: .5rem
            }

            .modal-footer .btn {
                width: 100%;
                text-align: center;
                padding: .65rem 1rem
            }

            input, textarea, select {
                font-size: .85rem;
                padding: .6rem .75rem
            }
        }

        /* ── SMALL TABLETS (641–1100px) minor tweaks ── */
        @media (min-width: 641px) and (max-width: 1100px) {
            header {
                padding: 1.75rem 1.5rem 1.5rem
            }

            .toolbar {
                padding: 1rem 1.5rem
            }

            .stats-bar {
                padding: .8rem 1.5rem
            }

            .section {
                padding: 2rem 1.5rem 0
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <span class="ibm-eyebrow">IBM · AI Fundamentals &amp; Artificial Intelligence and Machine Learning — Flashcards v3</span>
                <div id="mainTitle" class="header-title" contenteditable="true" spellcheck="false"><span>IBM</span> AI Flashcards</div>
                <div id="mainSub" class="header-sub" contenteditable="true" spellcheck="false">Conceptos auditados · IBM AI Fundamentals &amp; IBM AI and Machine Learning</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openModal('card')">+ New Card</button>
                <button class="btn btn-ghost" onclick="openModal('category')">+ New Category</button>
            </div>
        </div>
    </header>

    <nav class="toolbar" id="toolbar"></nav>
    <div class="stats-bar" id="statsBar"></div>
    <div id="main"></div>

    <div class="modal-overlay" id="modalCard">
        <div class="modal">
            <h3>New Flashcard</h3>
            <div class="form-group"><label>Category</label><select id="cardCat"></select></div>
            <div class="form-group"><label>Term (English)</label><input id="cardTerm" placeholder="e.g. Linear Regression" /></div>
            <div class="form-group"><label>Definition</label><textarea id="cardDef" placeholder="Definición concisa…"></textarea></div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('card')">Cancel</button>
                <button class="btn btn-primary" onclick="addCard()">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalCat">
        <div class="modal">
            <h3>New Category</h3>
            <div class="form-group"><label>Name</label><input id="catName" placeholder="e.g. Supervised Algorithms" /></div>
            <div class="form-group"><label>Emoji</label><input id="catEmoji" placeholder="🧠" maxlength="4" /></div>
            <div class="form-group"><label>Accent color (hex)</label><input id="catColor" placeholder="#0f62fe" /></div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('category')">Cancel</button>
                <button class="btn btn-primary" onclick="addCategory()">Create</button>
            </div>
        </div>
    </div>

    <script>
        // ── editable titles ──
        const titleEl = document.getElementById('mainTitle');
        const subEl = document.getElementById('mainSub');
        if (localStorage.getItem('ibm3_title')) titleEl.innerHTML = localStorage.getItem('ibm3_title');
        if (localStorage.getItem('ibm3_sub')) subEl.innerText = localStorage.getItem('ibm3_sub');
        titleEl.addEventListener('input', () => localStorage.setItem('ibm3_title', titleEl.innerHTML));
        subEl.addEventListener('input', () => localStorage.setItem('ibm3_sub', subEl.innerText));

        // ── COURSE LABELS ──
        // C1 = IBM AI Fundamentals
        // C2 = IBM Artificial Intelligence and Machine Learning

        const DEFAULT_CATEGORIES = [
            { id: 'ia-core', name: 'AI — Core Concepts', emoji: '🧠', color: '#0f62fe', course: 'C1' },
            { id: 'ia-aug', name: 'AI vs. Augmented Intelligence', emoji: '🤝', color: '#0072c3', course: 'C1' },
            { id: 'ml-core', name: 'Machine Learning — Foundations', emoji: '⚙️', color: '#005d5d', course: 'C1+C2' },
            { id: 'ml-types', name: 'ML Learning Types', emoji: '📊', color: '#007d79', course: 'C1+C2' },
            { id: 'supervised', name: 'Supervised Algorithms', emoji: '📈', color: '#0043ce', course: 'C2' },
            { id: 'unsup', name: 'Unsupervised Algorithms', emoji: '🔍', color: '#6929c4', course: 'C2' },
            { id: 'ml-eval', name: 'Model Evaluation & AutoAI', emoji: '📐', color: '#b28600', course: 'C1+C2' },
            { id: 'deep', name: 'Deep Learning & Generative AI', emoji: '🔬', color: '#9f1853', course: 'C1' },
            { id: 'cnn-gan', name: 'CNNs & GANs', emoji: '🕸️', color: '#740937', course: 'C1' },
            { id: 'nlp', name: 'NLP & Computer Vision', emoji: '💬', color: '#198038', course: 'C1' },
            { id: 'math', name: 'Mathematics for ML', emoji: '➗', color: '#8a3800', course: 'C2' },
            { id: 'ml-limits', name: 'ML Tasks, Experience & Limits', emoji: '⚠️', color: '#697077', course: 'C2' },
            { id: 'ibm-tools', name: 'IBM Watson Studio & AutoAI', emoji: '🛠️', color: '#1192e8', course: 'C1' },
            { id: 'watsonx', name: 'IBM watsonx Ecosystem', emoji: '🔷', color: '#0530ad', course: 'C1' },
            { id: 'python', name: 'Python for ML', emoji: '🐍', color: '#007d79', course: 'C2' },
            { id: 'ethics', name: 'AI Ethics & IBM Pillars', emoji: '⚖️', color: '#da1e28', course: 'C1' },
            { id: 'careers', name: 'AI/ML Careers', emoji: '💼', color: '#740937', course: 'C1' },
        ];

        const COURSE_LABELS = {
            'C1': { text: 'IBM AI Fundamentals', color: '#0f62fe' },
            'C2': { text: 'IBM AI & Machine Learning', color: '#6929c4' },
            'C1+C2': { text: 'IBM AI Fundamentals + AI & ML', color: '#005d5d' },
        };

        const DEFAULT_CARDS = [

            // ══════════════════════════════════════════════
            // AI — CORE CONCEPTS  (C1)
            // ══════════════════════════════════════════════
            {
                id: 1, cat: 'ia-core',
                term: 'Artificial Intelligence (AI) — IBM Definition',
                def: 'Campo que combina ciencias de la computación y conjuntos de datos robustos para habilitar la resolución de problemas. Las máquinas aprenden patrones y hacen predicciones. La IA no reemplaza las decisiones humanas; agrega valor al juicio humano.',
                src: 'AI vs Augmented Intelligence (transcript) · AI Fundamentals'
            },

            {

            {
                id: 194, cat: 'careers',
                term: 'Data Engineer',
                def: 'Construye y mantiene la infraestructura de datos: pipelines ETL/ELT, data lakes, almacenamiento estructurado/no estructurado. Asegura que los datos lleguen limpios, a tiempo y en forma a los Data Scientists para entrenar modelos.',
                src: 'Careers (notes) · AI Fundamentals'
            },

            {
                id: 195, cat: 'careers',
                term: 'AI Researcher',
                def: 'Desarrolla nuevos algoritmos y avances teóricos en ML/DL. Publica papers académicos. Trabaja en laboratorios como IBM Research. Ejemplos de su output: AutoAI, IBM Granite, AIF360, el algoritmo RBFOpt.',
                src: 'Careers (notes) · AI Fundamentals'
            },

            {
                id: 196, cat: 'careers',
                term: 'Data Platform Solution Engineer (IBM)',
                def: 'Rol híbrido de IBM que combina conocimiento técnico profundo de plataformas de datos e IA (Cloud Pak for Data, watsonx) con habilidades de consultoría y comunicación. Ayuda a clientes a adoptar e implementar soluciones de IA en producción.',
                src: 'What is Machine Learning (video) — Luv Aggarwal, IBM · AI Fundamentals'
            },
        ];

        // ── STATE ──
        let categories = JSON.parse(localStorage.getItem('ibm3_cats') || 'null') || DEFAULT_CATEGORIES;
        let cards = JSON.parse(localStorage.getItem('ibm3_cards') || 'null') || DEFAULT_CARDS;
        let activeFilter = 'all';
        let nextId = Math.max(...cards.map(c => c.id), 0) + 1;

        function save() {
            localStorage.setItem('ibm3_cats', JSON.stringify(categories));
            localStorage.setItem('ibm3_cards', JSON.stringify(cards));
        }

        // ── RENDER ──
        function render() { renderToolbar(); renderStats(); renderMain(); }

        function renderToolbar() {
            const bar = document.getElementById('toolbar');
            bar.innerHTML = '';
            const allBtn = mkPill('📚', 'ALL', cards.length, activeFilter === 'all', '#0f62fe');
            allBtn.onclick = () => { activeFilter = 'all'; render(); };
            bar.appendChild(allBtn);
            categories.forEach(cat => {
                const count = cards.filter(c => c.cat === cat.id).length;
                const label = cat.name.split(' ').slice(0, 3).join(' ');
                const btn = mkPill(cat.emoji, label, count, activeFilter === cat.id, cat.color);
                btn.onclick = () => { activeFilter = cat.id; render(); };
                bar.appendChild(btn);
            });
        }

        function mkPill(emoji, label, count, active, color) {
            const btn = document.createElement('button');
            btn.className = 'cat-pill' + (active ? ' active' : '');
            if (active) btn.style.cssText = `border-color:${color};background:${color}22;color:#fff`;
            btn.innerHTML = `${emoji} ${label} <span class="pill-count">${count}</span>`;
            return btn;
        }

        function renderStats() {
            const s = document.getElementById('statsBar');
            const total = cards.length;
            const cats = categories.length;
            s.innerHTML = `<span><strong>${total}</strong> flashcards</span><span><strong>${cats}</strong> categorías</span><span>Courses: IBM AI Fundamentals (C1) · IBM AI &amp; Machine Learning (C2)</span>`;
        }

        function renderMain() {
            const main = document.getElementById('main');
            main.innerHTML = '';
            const visCats = activeFilter === 'all' ? categories : categories.filter(c => c.id === activeFilter);

            visCats.forEach(cat => {
                const catCards = cards.filter(c => c.cat === cat.id);
                if (catCards.length === 0 && activeFilter !== 'all') return;

                const section = document.createElement('div');
                section.className = 'section';

                // header
                const hdr = document.createElement('div');
                hdr.className = 'section-header';
                hdr.style.borderColor = cat.color;

                const titleDiv = document.createElement('div');
                titleDiv.className = 'section-title';
                titleDiv.style.color = cat.color;

                const dot = document.createElement('span');
                dot.className = 'section-dot';
                dot.style.background = cat.color;
                titleDiv.appendChild(dot);
                titleDiv.appendChild(document.createTextNode(`${cat.emoji}  ${cat.name}`));

                const badge = document.createElement('span');
                badge.className = 'section-badge';
                badge.textContent = catCards.length + ' cards';
                titleDiv.appendChild(badge);

                // course tag
                const courseKey = cat.course || 'C1';
                const courseInfo = COURSE_LABELS[courseKey] || COURSE_LABELS['C1'];
                const courseTag = document.createElement('span');
                courseTag.className = 'course-tag';
                courseTag.style.color = courseInfo.color;
                courseTag.style.borderColor = courseInfo.color;
                courseTag.style.background = courseInfo.color + '12';
                courseTag.textContent = courseInfo.text;
                titleDiv.appendChild(courseTag);

                const actDiv = document.createElement('div');
                actDiv.style = 'display:flex;gap:.5rem';
                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-danger btn-sm';
                delBtn.textContent = '✕ Delete';
                delBtn.onclick = () => deleteCategory(cat.id);
                actDiv.appendChild(delBtn);

                hdr.appendChild(titleDiv);
                hdr.appendChild(actDiv);
                section.appendChild(hdr);

                // grid
                const grid = document.createElement('div');
                grid.className = 'cards-grid';

                if (catCards.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.textContent = 'No cards yet. Add one →';
                    grid.appendChild(empty);
                } else {
                    catCards.forEach((card, i) => {
                        const el = document.createElement('div');
                        el.className = 'card';
                        el.style.setProperty('--cat-color', cat.color);
                        el.style.animationDelay = `${i * .03}s`;

                        const module = document.createElement('div');
                        module.className = 'card-module';
                        module.style.color = cat.color;
                        const ck = cat.course || 'C1';
                        module.textContent = (COURSE_LABELS[ck] || COURSE_LABELS['C1']).text.toUpperCase();

                        const delCard = document.createElement('button');
                        delCard.className = 'card-del';
                        delCard.textContent = '✕';
                        delCard.onclick = () => deleteCard(card.id);

                        const term = document.createElement('div');
                        term.className = 'card-term';
                        term.textContent = card.term;

                        const def = document.createElement('div');
                        def.className = 'card-def';
                        def.innerHTML = escHtml(card.def);

                        el.appendChild(module);
                        el.appendChild(delCard);
                        el.appendChild(term);
                        el.appendChild(def);

                        if (card.src) {
                            const src = document.createElement('div');
                            src.className = 'card-source';
                            src.style.borderColor = cat.color;
                            src.textContent = card.src;
                            el.appendChild(src);
                        }

                        grid.appendChild(el);
                    });
                }

                section.appendChild(grid);
                main.appendChild(section);
            });
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        // ── MODALS ──
        function openModal(type) {
            if (type === 'card') {
                const sel = document.getElementById('cardCat');
                sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
                if (activeFilter !== 'all') sel.value = activeFilter;
                document.getElementById('cardTerm').value = '';
                document.getElementById('cardDef').value = '';
                document.getElementById('modalCard').classList.add('open');
                document.getElementById('cardTerm').focus();
            } else {
                document.getElementById('catName').value = '';
                document.getElementById('catEmoji').value = '';
                document.getElementById('catColor').value = '#0f62fe';
                document.getElementById('modalCat').classList.add('open');
                document.getElementById('catName').focus();
            }
        }
        function closeModal(type) {
            document.getElementById(type === 'card' ? 'modalCard' : 'modalCat').classList.remove('open');
        }
        document.querySelectorAll('.modal-overlay').forEach(o => {
            o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(o => o.classList.remove('open'));
        });

        // ── CRUD ──
        function addCard() {
            const cat = document.getElementById('cardCat').value.trim();
            const term = document.getElementById('cardTerm').value.trim();
            const def = document.getElementById('cardDef').value.trim();
            if (!term || !def) { alert('Completá el término y la definición.'); return; }
            cards.push({ id: nextId++, cat, term, def });
            save(); closeModal('card'); render();
        }
        function deleteCard(id) {
            if (!confirm('¿Eliminar esta tarjeta?')) return;
            cards = cards.filter(c => c.id !== id);
            save(); render();
        }
        function addCategory() {
            const name = document.getElementById('catName').value.trim();
            const emoji = document.getElementById('catEmoji').value.trim() || '📌';
            const color = document.getElementById('catColor').value.trim() || '#0f62fe';
            if (!name) { alert('Ingresá un nombre.'); return; }
            const id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            if (categories.find(c => c.id === id)) { alert('Ya existe esa categoría.'); return; }
            categories.push({ id, name, emoji, color, course: 'C1' });
            save(); closeModal('category'); render();
        }
        function deleteCategory(id) {
            const count = cards.filter(c => c.cat === id).length;
            const msg = count > 0 ? `Esta categoría tiene ${count} tarjeta(s). ¿Eliminar todo?` : '¿Eliminar esta categoría?';
            if (!confirm(msg)) return;
            categories = categories.filter(c => c.id !== id);
            cards = cards.filter(c => c.cat !== id);
            if (activeFilter === id) activeFilter = 'all';
            save(); render();
        }

        render();
    </script>
</body>
</html>
